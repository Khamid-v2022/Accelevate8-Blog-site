define ROOT "E:/laragon/www/wp-blogs"
define SITE "wp-blogs.test"

<VirtualHost *:80> 
    DocumentRoot "${ROOT}"
    ServerName ${SITE}
    ServerAlias *.${SITE}
    <Directory "${ROOT}">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    DocumentRoot "${ROOT}"
    ServerName ${SITE}
    ServerAlias *.${SITE}
    <Directory "${ROOT}">
        AllowOverride All
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile      E:/laragon/etc/ssl/laragon.crt
    SSLCertificateKeyFile   E:/laragon/etc/ssl/laragon.key
 
</VirtualHost>
